name: Build chat-api

on: workflow_dispatch

jobs:
  test:
    runs-on: ubuntu-latest
    name: Build chat-api
    steps:

      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 16

      - name: Clone Repo
        run: |
          export LATEST_APP=$(wget -qO- https://api.github.com/repos/ai365vip/chat-api/tags | gawk -F '["v]' '/name/{print "v"$5;exit}')
          git clone -b $LATEST_APP https://github.com/ai365vip/chat-api

      - name: Build Frontend Admin
        env:
          CI: ""
        run: |
          cd chat-api/web-admin
          npm install
          REACT_APP_VERSION=$(git describe --tags) npm run build
          cd ../..

      - name: Build Frontend User
        env:
          CI: ""
        run: |
          cd chat-api/web-user
          npm install
          REACT_APP_VERSION=$(git describe --tags) npm run build
          cd ../..

      - name: Build Backend
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          release: 13.2
          prepare: |
            pkg install -y jq wget curl git gcc bash gawk gsed
            wget https://dl.google.com/go/go1.22.0.freebsd-amd64.tar.gz && tar -C /usr/local -xzf go1.22.0.freebsd-amd64.tar.gz && rm go1.22.0.freebsd-amd64.tar.gz
            ln -s /usr/local/go/bin/go /usr/local/bin/go
          run: |
            git config --global --add safe.directory /home/runner/work/new-api-freebsd/new-api-freebsd/chat-api
            cd chat-api
            go mod download
            go build -ldflags "-s -w -X 'one-api/common.Version=$(git describe --tags)' -extldflags '-static'" -o chat-api

      - name: Upload artifact
        uses: actions/upload-artifact@main
        with:
          name: chat-api-freebsd
          path: |
              chat-api/chat-api

      - name: Generate release tag
        id: tag
        run: echo "release_tag=$(wget -qO- https://api.github.com/repos/ai365vip/chat-api/tags | gawk -F '["v]' '/name/{print "v"$5;exit}')" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          files: |
                chat-api/chat-api

      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 1
          keep_minimum_runs: 8
